<!DOCTYPE html>
<html lang="en" data-framework="JavaScript-es5">
<head>
    <meta charset="UTF-8"/>
    <meta name="description" content="A TodoMVC written with JavaScript-es5 features."/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>TodoMVC: JavaScript Es5</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <section class="todoapp">
        <header class="header">
            <h1>todos</h1>
            <input type="text" class="new-todo" placeholder="What needs to be done?" autofocus/>
        </header>
        <main class="main">
            <div class="toggle-all-container">
                <input 
                id="toggle-all"
                type="checkbox" 
                class="toggle-all"
                />
                <label class="toggle-all-label" for="toggle-all">
                    Mark all as complete
                </label>
            </div>
            <ul class="todo-list"></ul>
        </main>
        <footer class="footer">
            <span class="todo-count"></span>
            <ul class="filters">
                <li>
                    <a href="#/" class="selected">All</a>
                </li>
                <li>
                    <a href="#/active">Active</a>
                </li>
                <li>
                    <a href="#/completed">Completed</a>
                </li>
            </ul>
            <button class="clear-completed">Clear Completed</button>
        </footer>
    </section>
    <footer class="info">
        <p>Double-click to edit a todo</p>
        <p>Created by JIN-XIAOWU</p>
        <p>Maintained by JIN-XIAOWU</p>
    </footer>
    <script src="./app.js"></script>
</body>
</html>
